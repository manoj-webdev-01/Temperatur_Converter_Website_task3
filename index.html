<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Temperature Converter</title>

    <style>
      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
        font-family: Arial, sans-serif;
      }

      body {
        min-height: 100vh;
        display: flex;
        justify-content: center;
        align-items: center;
        background: linear-gradient(135deg, #4facfe, #00f2fe);
      }

      .container {
        background: white;
        padding: 35px;
        border-radius: 15px;
        width: 90%;
        max-width: 420px;
        text-align: center;
        box-shadow: 0 10px 25px rgba(0, 0, 0, 0.2);
      }

      h1 {
        margin-bottom: 25px;
        color: #333;
      }

      input,
      select,
      button {
        width: 100%;
        padding: 14px;
        margin: 12px 0;
        border-radius: 8px;
        border: 1px solid #ccc;
        font-size: 16px;
      }

      button {
        background: #2196f3;
        color: white;
        border: none;
        cursor: pointer;
        font-weight: bold;
        transition: 0.3s;
      }

      button:hover {
        background: #1976d2;
      }

      .result {
        margin-top: 20px;
        padding: 15px;
        background: #f1f8ff;
        border-radius: 10px;
        font-size: 22px;
        font-weight: bold;
        color: #0d47a1;
      }

      .error {
        color: red;
        margin-top: 10px;
        font-size: 14px;
      }
    </style>
  </head>
  <body>
    <div class="container">
      <h1>🌡 Temperature Converter</h1>

      <input type="text" id="tempInput" placeholder="Enter temperature" />

      <select id="unit">
        <option value="celsius">Celsius (°C)</option>
        <option value="fahrenheit">Fahrenheit (°F)</option>
        <option value="kelvin">Kelvin (K)</option>
      </select>

      <button onclick="convertTemp()">Convert</button>

      <p class="error" id="error"></p>

      <div class="result" id="result">Converted value appears here</div>
    </div>

    <script>
      function convertTemp() {
        let temp = document.getElementById("tempInput").value;
        let unit = document.getElementById("unit").value;
        let result = document.getElementById("result");
        let error = document.getElementById("error");

        error.innerText = "";

        if (temp === "" || isNaN(temp)) {
          error.innerText = "Please enter a valid number!";
          result.innerText = "Converted value appears here";
          return;
        }

        temp = Number(temp);

        let converted = "";

        if (unit === "celsius") {
          let f = (temp * 9) / 5 + 32;
          let k = temp + 273.15;

          converted = `${temp} °C = ${f.toFixed(2)} °F | ${k.toFixed(2)} K`;
        } else if (unit === "fahrenheit") {
          let c = ((temp - 32) * 5) / 9;
          let k = c + 273.15;

          converted = `${temp} °F = ${c.toFixed(2)} °C | ${k.toFixed(2)} K`;
        } else {
          let c = temp - 273.15;
          let f = (c * 9) / 5 + 32;

          converted = `${temp} K = ${c.toFixed(2)} °C | ${f.toFixed(2)} °F`;
        }

        result.innerText = converted;
      }
    </script>
  </body>
</html>
